<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7C3AED" />
    <meta
      name="description"
      content="TogetherGoals — a goal tracker for couples. Track habits, health and careers side by side, and celebrate the wins together."
    />
    <title>TogetherGoals — grow together, every day</title>

    <script>
      // Applied before first paint so dark-mode users never see a white flash.
      ;(function () {
        var stored = localStorage.getItem('tg.theme') || 'system'
        var dark =
          stored === 'dark' ||
          (stored === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
